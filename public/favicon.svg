<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#0d0b1a"/>
    </radialGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4601a" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#e8834a"/>
      <stop offset="60%" stop-color="#ffac6e"/>
      <stop offset="100%" stop-color="#d4601a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8834a" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffac6e" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#ffac6e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8834a" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundRect">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#roundRect)" opacity="0.06">
    <line x1="0" y1="16" x2="64" y2="16" stroke="#e8834a" stroke-width="0.5"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#e8834a" stroke-width="0.5"/>
    <line x1="0" y1="48" x2="64" y2="48" stroke="#e8834a" stroke-width="0.5"/>
    <line x1="16" y1="0" x2="16" y2="64" stroke="#e8834a" stroke-width="0.5"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#e8834a" stroke-width="0.5"/>
    <line x1="48" y1="0" x2="48" y2="64" stroke="#e8834a" stroke-width="0.5"/>
  </g>

  <!-- Glow trail beneath pulse -->
  <path d="M4,32 L14,32 L18,32 L21,26 L24,38 L27,20 L30,44 L33,14 L36,44 L39,26 L42,32 L46,32 L60,32"
    fill="none"
    stroke="url(#glowGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    clip-path="url(#roundRect)"
    filter="url(#softGlow)"
    opacity="0.5"/>

  <!-- Main pulse line -->
  <path d="M4,32 L14,32 L18,32 L21,26 L24,38 L27,20 L30,44 L33,14 L36,44 L39,26 L42,32 L46,32 L60,32"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    clip-path="url(#roundRect)"
    filter="url(#glow)"/>

  <!-- Peak dot (bright spark at apex) -->
  <circle cx="33" cy="14" r="2.5" fill="#ffe0c8" filter="url(#glow)" opacity="0.95"/>
  <circle cx="33" cy="14" r="1.2" fill="#ffffff"/>

</svg>
